<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Orthodox eight-pointed cross: vertical post, titulus, crossbar, slanted footrest.
       Footrest tilts traditionally — viewer-left up (the repentant thief ascends),
       viewer-right down (the unrepentant descends). -->
  <g fill="#d8b069">
    <rect x="29" y="5"  width="6"  height="54" rx="0.5"/>
    <rect x="22" y="13" width="20" height="4"  rx="0.5"/>
    <rect x="13" y="23" width="38" height="6"  rx="0.5"/>
    <g transform="rotate(20 32 44)">
      <rect x="15" y="42" width="34" height="4" rx="0.5"/>
    </g>
  </g>
</svg>
